name: build

on:
  push:
    branches:
      - main*
  workflow_dispatch:

jobs:
  build:
    env:
      REGISTRY: us-west1-docker.pkg.dev
      IMAGE: som-rit-infrastructure-dev/starr/tide
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && !contains(github.event.head_commit.message, '!ignore')

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: 'som-rit-infrastructure-prod'
          workload_identity_provider: 'projects/294515190965/locations/global/workloadIdentityPools/github/providers/susom-github'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          version: '>= 363.0.0'

      - name: Authenticate to GAR, get timestamp
        id: docker
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}
          ts=$(date +%Y%m%d%H%M%S)
          echo "BUILD_ID=build-${ts}" >> $GITHUB_OUTPUT

      - name: Setup buildx so we can use GHA caching
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          build-args: |
            DOCKER_TAG=${{ steps.docker.outputs.BUILD_ID }}
            GITHUB_REF_NAME=${{ env.BRANCH_NAME }}
            GITHUB_REF_TYPE=${{ github.ref_type }}
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:3.0.39-SNAPSHOT
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.docker.outputs.BUILD_ID }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.BRANCH_NAME }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest