name: build

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    env:
      REGISTRY: us-west1-docker.pkg.dev
      IMAGE: ${{ secrets.ARTIFACT_REGISTRY_REPO }}/tide
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && !contains(github.event.head_commit.message, '!ignore')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Get version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Maven deploy
        run: mvn -gs maven/settings.xml -Dmaven.test.skip=true deploy
        env:
          REPO_API_TOKEN: ${{ secrets.REPO_TOKEN }}

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: 'som-rit-infrastructure-prod'
          workload_identity_provider: 'projects/294515190965/locations/global/workloadIdentityPools/github/providers/susom-github'
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          token_format: 'access_token'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          version: '>= 363.0.0'

      - name: Authenticate to GAR, get timestamp
        id: docker
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}
          ts=$(date +%Y%m%d%H%M%S)
          echo "BUILD_ID=build-${ts}" >> $GITHUB_OUTPUT

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Setup buildx so we can use GHA caching
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          build-args: |
            DOCKER_TAG=${{ steps.docker.outputs.BUILD_ID }}
            GITHUB_REF_NAME=${{ env.BRANCH_NAME }}
            GITHUB_REF_TYPE=${{ github.ref_type }}
            ARTIFACT_REGISTRY_TOKEN=${{ steps.auth.outputs.access_token }}
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.docker.outputs.BUILD_ID }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.BRANCH_NAME }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest

      - name: Create Build Summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build ID | \`${{ steps.docker.outputs.BUILD_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ env.BRANCH_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY